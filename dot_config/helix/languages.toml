[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.initialization_options.inlayHints]
closureStyle = "rust_analyzer"

[language-server.emmet-lsp]
command = "emmet-language-server"
args = ["--stdio"]

[language-server.basedpyright.config]
basedpyright.analysis.typeCheckingMode = "standard"
basedpyright.analysis.diagnosticMode = "openFilesOnly"
basedpyright.analysis.reportUnknownMemberType = "none"
basedpyright.analysis.reportUnknownVariableType = "none"
basedpyright.analysis.reportUnknownArgumentType = "none"
basedpyright.analysis.reportUnknownParameterType = "none"

[language-server.ltex-ls]
command = "ltex-ls"

[language-server.ltex-ls.config]
language = "en-us"
completionEnabled = true
statusBartexlab = true

[language-server.ltex-ls.config.dictionary]
en-us = ["Raed", "Mirza"]

# -------------------------
# Formatters / languages
# -------------------------
[[language]]
name = "c"
language-servers = ["clangd"]
formatter = { command = "clang-format", args = ["--assume-filename", "%file"] }
auto-format = true

[[language]]
name = "cpp"
language-servers = ["clangd"]
formatter = { command = "clang-format", args = ["--assume-filename", "%file"] }
auto-format = true

[[language]]
name = "python"
language-servers = ["ty"]
formatter = { command = "ruff", args = [
  "format",
  "--stdin-filename",
  "{%file}",
  "-"
] }

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "tailwindcss-ls"]
indent = { tab-width = 2, unit = " " }

# Web formats
[[language]]
name = "html"
language-servers = [
  "vscode-html-language-server",
  "tailwindcss-ls",
  "emmet-language-server"
]
indent = { tab-width = 2, unit = " " }

[[language]]
name = "css"
language-servers = [
  "vscode-css-language-server",
  "tailwindcss-ls",
  "emmet-language-server"
]
indent = { tab-width = 2, unit = " " }

[[language]]
name = "jsonc"
file-types = ["json", "jsconc"]
language-servers = ["json"]
formatter = { command = "prettier", args = ["--parser", "json"] }
indent = { tab-width = 2, unit = " " }

[[language]]
name = "scss"
formatter = { command = "prettier", args = ["--stdin-filepath", "%file"] }
auto-format = true
indent = { tab-width = 2, unit = " " }

[[language]]
name = "graphql"
formatter = { command = "prettier", args = ["--stdin-filepath", "%file"] }
auto-format = true

[[language]]
name = "latex"
language-servers = ["texlab", "ltex-ls"]
file-types = ["tex"]
auto-format = true
comment-token = "%"
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "haskell"
formatter = { command = "zsh", args = [
  "-c",
  "fourmolu --stdin-input-file $(pwd)"
] }

[texlab.config]
build.forwardSearchAfter = true
build.onSave = true
forwardSearch.executable = "pdflatex"
forwardSearch.args = ["--synctex-forward", "%l:1:%f", "%p"]

[[grammar]]
name = "latex"
source = { git = "https://github.com/latex-lsp/tree-sitter-latex", rev = "8c75e93cd08ccb7ce1ccab22c1fbd6360e3bcea6" }
